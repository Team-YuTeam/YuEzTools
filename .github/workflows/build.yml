name: Build YuEzTools Mod

# 触发方式：推送到main / 手动触发
on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      build_config:
        description: '构建配置'
        required: true
        default: 'Release'
        type: choice
        options:
          - Release
          - Canary

jobs:
  build:
    runs-on: windows-latest
    name: 构建 Windows 版本
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 让 GitInfo 正常工作

      - name: 设置 .NET 6
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 6.x

      - name: 启用长路径支持（解决NuGet问题）
        run: git config --system core.longpaths true

      - name: 获取构建配置
        id: config
        shell: pwsh
        run: |
          if ('${{ github.event.inputs.build_config }}' -ne '') {
            echo "config=${{ github.event.inputs.build_config }}" >> $env:GITHUB_OUTPUT
          } else {
            echo "config=Release" >> $env:GITHUB_OUTPUT
          }

      # 构建 Windows 版本
      - name: 构建 Windows 版本
        run: dotnet build -c ${{ steps.config.outputs.config }} -p:Platform=Windows -o build/Windows

      # 打包输出
      - name: 打包 Windows 版本
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path output
          Compress-Archive -Path build/Windows/* -DestinationPath output/YuEzTools_Windows.zip -Force

      # 上传构建产物
      - name: 上传构建文件
        uses: actions/upload-artifact@v4
        with:
          name: YuEzTools-Build-${{ steps.config.outputs.config }}
          path: output/
